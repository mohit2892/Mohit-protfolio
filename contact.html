<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Contact | Mohit</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

    <div class="logo">

        <div class="logo-circle">
            M
        </div>

        Mohit.dev

    </div>

</header>

<section class="contact-section">

    <div class="contact-box">

        <h2>
            Let’s Work Together
        </h2>

        <form>

            <input type="text"
            placeholder="Your Name">

            <input type="email"
            placeholder="Email">

            <textarea
            placeholder="Message"></textarea>

            <button type="submit">

                Send Message

            </button>

        </form>

    </div>

</section>

</body>
</html>
